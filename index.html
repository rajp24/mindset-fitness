<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MINDSET — Built Different.</title>
<link rel="icon" type="image/png" href="images/logo.png" sizes="32x32"/>
<link rel="apple-touch-icon" href="images/logo.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#080808;
  --text:#f2f2f2;
  --muted:#666;
  --dim:#333;
  --accent:#00BD7B;
  --font:'Inter',sans-serif;
  --display:'Bebas Neue',sans-serif;
}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:var(--font);overflow-x:hidden;-webkit-font-smoothing:antialiased;}
::selection{background:var(--accent);color:#000;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:#222;}

/* Custom cursor — desktop only */
#cursor{
  position:fixed;width:10px;height:10px;
  background:#00BD7B;border-radius:50%;
  pointer-events:none;z-index:99999;
  transform:translate(-50%,-50%);
  transition:width .2s ease,height .2s ease,background .2s ease,border .2s ease;
  left:-100px;top:-100px;
}
#cursor.big{
  width:24px;height:24px;
  background:transparent;
  border:2px solid #00BD7B;
}
@media(max-width:768px){#cursor{display:none;}}

/* Ken Burns */
@keyframes kenburns{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.08);}
}

@keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.marquee-inner{
  display:flex;
  animation:marquee 18s linear infinite;
  white-space:nowrap;
  will-change:transform;
}

@keyframes scrollPulse{0%,100%{opacity:.3;transform:scaleY(1)}50%{opacity:1;transform:scaleY(0.5)}}

/* Scroll reveal */
.reveal{
  opacity:0;
  transform:translateY(40px);
  transition:opacity .6s ease, transform .6s cubic-bezier(.16,1,.3,1);
}
.reveal.visible{opacity:1;transform:translateY(0);}

/* Mobile nav dropdown */
/* closed → base rule defines the CLOSING transition (250ms ease-in) */
.mobile-menu{
  display:flex;flex-direction:column;
  position:fixed;top:56px;left:0;right:0;
  background:rgba(0,0,0,.95);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid #00BD7B;
  z-index:999;padding:8px 0 20px;
  opacity:0;
  transform:translateY(-100%);
  pointer-events:none;
  /* CLOSING — fast ease-in, menu snaps back up */
  transition:
    transform 250ms ease-in,
    opacity 200ms ease-in;
}
/* open → .open rule defines the OPENING transition (spring, 400ms) */
.mobile-menu.open{
  opacity:1;
  transform:translateY(0);
  pointer-events:auto;
  /* OPENING — spring easing, feels like it has weight */
  transition:
    transform 400ms cubic-bezier(0.16,1,0.3,1),
    opacity 300ms ease-out;
}
/* Links — start hidden, stagger in after menu begins opening */
.mobile-menu a{
  padding:15px 28px;font-size:13px;letter-spacing:.12em;
  text-transform:uppercase;color:rgba(255,255,255,.9);text-decoration:none;
  border-bottom:1px solid rgba(255,255,255,.05);
  opacity:0;
  transform:translateY(12px);
  transition:opacity 280ms ease-out,transform 280ms cubic-bezier(0.16,1,0.3,1);
}
.mobile-menu.open a{opacity:1;transform:translateY(0);}
/* 60ms stagger, offset so first link starts after menu is already sliding */
.mobile-menu.open a:nth-child(1){transition-delay:80ms;}
.mobile-menu.open a:nth-child(2){transition-delay:140ms;}
.mobile-menu.open a:nth-child(3){transition-delay:200ms;}
.mobile-menu.open a:nth-child(4){transition-delay:260ms;}
.mobile-menu a:last-child{border-bottom:none;}

/* Hamburger lines */
.ham-line{width:22px;height:1.5px;background:#fff;display:block;transition:transform .3s ease-in-out,opacity .3s ease-in-out;}

@media(max-width:768px){
  .nav-links{display:none!important;}
  .hamburger{display:flex!important;}
  .hero-text{bottom:48px!important;left:0!important;right:0!important;padding:0 24px!important;text-align:center!important;align-items:center!important;}
  .hero-headline{font-size:60px!important;}
  .hero-cta{flex-direction:column!important;align-items:stretch!important;gap:10px!important;}
  .hero-cta>div,.hero-cta>span{width:100%!important;}
  .hero-cta button{width:100%!important;}
  .latest-section{flex-direction:column!important;height:auto!important;}
  .latest-img{flex:none!important;width:100%!important;height:55vw!important;min-height:240px!important;}
  .latest-text{flex:none!important;width:100%!important;position:static!important;padding:40px 24px 60px!important;}
  .latest-text-inner{position:static!important;transform:none!important;padding:0!important;}
  .popular-grid{grid-template-columns:repeat(2,1fr)!important;}
  .popular-section{padding:40px 20px 56px!important;}
  .reveal{transform:translateY(30px);}
  /* Kill fixed heights that create blank gaps */
  #home{min-height:0!important;}
  .latest-section{min-height:0!important;}
  /* Footer mobile */
  .footer-grid{grid-template-columns:1fr!important;gap:28px!important;}
  .footer-bottom{flex-direction:column!important;gap:10px!important;text-align:center!important;}
  footer{padding:40px 24px 28px!important;}
}
@media(max-width:480px){
  .hero-headline{font-size:52px!important;}
  .latest-img{height:80vw!important;}
}
</style>
</head>
<body>
<div id="cursor"></div>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef} = React;

function useMobile(bp=768){
  const [m,setM]=useState(typeof window!=='undefined'&&window.innerWidth<=bp);
  useEffect(()=>{
    const fn=()=>setM(window.innerWidth<=bp);
    window.addEventListener('resize',fn);return()=>window.removeEventListener('resize',fn);
  },[bp]);
  return m;
}

function useScrollReveal(threshold=0.12){
  const ref=useRef();
  const [vis,setVis]=useState(false);
  useEffect(()=>{
    const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting)setVis(true);},{threshold});
    if(ref.current)obs.observe(ref.current);
    return()=>obs.disconnect();
  },[threshold]);
  return [ref,vis];
}

const TWEAK_DEFAULTS={
  "accentColor":"#00BD7B",
  "heroLine1":"YOU VS",
  "heroLine2":"YOU.",
  "marqueeSpeed":18
};

const PRODUCTS=[
  {name:'The Angel Tee',     price:'$48',img:'images/single.JPG'},
  {name:'The Archangel Tee', price:'$48',img:'images/single.JPG'},
  {name:'Crew Essential Tee',price:'$48',img:'images/single.JPG'},
  {name:'Heritage Drop Tee', price:'$48',img:'images/single.JPG'},
];

/* ── Custom Cursor ───────────────────────────────── */
function initCursor(){
  const el=document.getElementById('cursor');
  if(!el)return;
  let active=false;
  const move=(e)=>{el.style.left=e.clientX+'px';el.style.top=e.clientY+'px';};
  const over=(e)=>{if(e.target.closest('button,a'))el.classList.add('big');};
  const out=(e)=>{if(e.target.closest('button,a'))el.classList.remove('big');};
  document.addEventListener('mousemove',move,{passive:true});
  document.addEventListener('mouseover',over);
  document.addEventListener('mouseout',out);
}

/* ── Nav ─────────────────────────────────────────── */
function Nav({cart,tweaks}){
  const [scrolled,setScrolled]=useState(false);
  const [menuOpen,setMenuOpen]=useState(false);
  useEffect(()=>{
    const fn=()=>setScrolled(window.scrollY>50);
    window.addEventListener('scroll',fn,{passive:true});
    return()=>window.removeEventListener('scroll',fn);
  },[]);
  const links=[
    {label:'Home',href:'index.html'},
    {label:'Summer Drop',href:'https://mindset-fitness.vercel.app/product.html'},
    {label:'Fall Line',href:'fall-line.html'},
    {label:'Winter Line',href:'winter-line.html'},
  ];
  return(
    <>
      <nav style={{
        position:'fixed',top:0,left:0,right:0,zIndex:1000,
        padding:'0 28px',height:'56px',
        display:'flex',alignItems:'center',justifyContent:'space-between',
        background:scrolled?'rgba(8,8,8,.88)':'transparent',
        backdropFilter:scrolled?'blur(20px)':'none',
        WebkitBackdropFilter:scrolled?'blur(20px)':'none',
        borderBottom:scrolled?'1px solid rgba(255,255,255,.06)':'1px solid transparent',
        transition:'background .3s ease,backdrop-filter .3s ease,border-color .3s ease',
      }}>
        <a href="index.html" style={{display:'flex',alignItems:'center',textDecoration:'none',lineHeight:0}}>
          <img src="images/logo.png" alt="MINDSET"
            style={{height:'44px',objectFit:'contain',display:'block'}}
            onError={e=>{e.currentTarget.style.display='none';e.currentTarget.nextSibling.style.display='block';}}
          />
          <span style={{display:'none',fontFamily:'var(--display)',fontSize:'20px',letterSpacing:'.2em',color:'#fff'}}>MINDSET</span>
        </a>
        <div className="nav-links" style={{display:'flex',gap:'32px'}}>
          {links.map(l=>(<NavLink key={l.label} href={l.href} accent={tweaks.accentColor}>{l.label}</NavLink>))}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:'20px'}}>
          <CartBtn count={cart} accent={tweaks.accentColor}/>
          <button className="hamburger" onClick={()=>setMenuOpen(o=>!o)}
            style={{display:'none',flexDirection:'column',gap:'5px',background:'none',border:'none',cursor:'pointer',padding:'4px'}}>
            <span className="ham-line" style={{
              transform:menuOpen?'translateY(6.5px) rotate(45deg)':'none',
            }}/>
            <span className="ham-line" style={{
              opacity:menuOpen?0:1,
              transform:menuOpen?'scaleX(0)':'scaleX(1)',
            }}/>
            <span className="ham-line" style={{
              transform:menuOpen?'translateY(-6.5px) rotate(-45deg)':'none',
            }}/>
          </button>
        </div>
      </nav>
      <div className={`mobile-menu${menuOpen?' open':''}`}>
        {links.map(l=><a key={l.label} href={l.href}
          target={l.href.startsWith('http')?'_blank':undefined}
          rel={l.href.startsWith('http')?'noopener noreferrer':undefined}
          onClick={()=>setMenuOpen(false)}>{l.label}</a>)}
      </div>
    </>
  );
}

function NavLink({children,href,accent}){
  const [h,setH]=useState(false);
  return(
    <a href={href||'#'} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
      style={{background:'none',border:'none',cursor:'pointer',fontFamily:'var(--font)',
        fontSize:'12px',letterSpacing:'.1em',textTransform:'uppercase',
        color:h?accent:'#fff',transition:'color .2s',fontWeight:500,
        textDecoration:'none'}}>
      {children}
    </a>
  );
}

function CartBtn({count,accent}){
  return(
    <div style={{position:'relative',cursor:'pointer',color:'#fff'}}>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
        <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <path d="M16 10a4 4 0 0 1-8 0"/>
      </svg>
      {count>0&&<span style={{position:'absolute',top:'-5px',right:'-5px',background:accent,color:'#000',borderRadius:'50%',width:'15px',height:'15px',fontSize:'9px',fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center'}}>{count}</span>}
    </div>
  );
}

/* ── Hero ─────────────────────────────────────────── */
function Hero({tweaks}){
  const isMobile=useMobile();
  const [in_,setIn]=useState(false);
  useEffect(()=>{setTimeout(()=>setIn(true),80);},[]);
  return(
    <section id="home" style={{position:'relative',width:'100vw',height:'100vh',overflow:'hidden'}}>
      <img src="images/main.jpg" style={{
        position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover',
        animation:'kenburns 12s ease-in-out infinite',
        transformOrigin:'center center',
      }} alt=""/>
      <div style={{position:'absolute',inset:0,background:'linear-gradient(135deg,rgba(0,0,0,.72) 0%,rgba(0,0,0,.2) 50%,rgba(0,0,0,.1) 100%)'}}/>
      <div style={{position:'absolute',inset:0,background:'linear-gradient(to top,rgba(0,0,0,.9) 0%,rgba(0,0,0,.4) 35%,transparent 65%)'}}/>

      <div className="hero-text" style={{
        position:'absolute',bottom:'80px',left:'48px',
        display:'flex',flexDirection:'column',
      }}>
        <div className="hero-headline" style={{
          fontSize:'clamp(90px,12vw,150px)',fontWeight:900,
          lineHeight:.88,letterSpacing:'-.04em',
          color:'#fff',textTransform:'uppercase',
          opacity:in_?1:0,
          transform:in_?'translateY(0)':'translateY(20px)',
          transition:'opacity 1.1s ease .05s, transform 1.1s cubic-bezier(.16,1,.3,1) .05s',
        }}>
          <div>{tweaks.heroLine1}</div>
          <div style={{WebkitTextStroke:'1px rgba(255,255,255,.5)',color:'transparent'}}>{tweaks.heroLine2}</div>
        </div>

        <div className="hero-cta" style={{marginTop:'24px',display:'flex',alignItems:'center',gap:'20px'}}>
          {/* Button — fades in at 400ms */}
          <div style={{opacity:in_?1:0,transition:'opacity .9s ease .45s',flexShrink:0}}>
            <Btn accent={tweaks.accentColor} filled onClick={()=>window.location.href='product.html'}>Shop the Drop</Btn>
          </div>
          {/* Subtitle — fades in at 200ms */}
          <span style={{
            fontSize:'10px',letterSpacing:'.2em',textTransform:'uppercase',color:'#fff',
            opacity:in_?1:0,
            transition:'opacity .9s ease .25s',
          }}>Summer 2026</span>
        </div>
      </div>

      <div style={{
        position:'absolute',bottom:'28px',left:'50%',transform:'translateX(-50%)',
        display:'flex',flexDirection:'column',alignItems:'center',gap:'6px',
        opacity:in_?1:0,transition:'opacity 1s ease 1s',
      }}>
        <span style={{fontSize:'9px',letterSpacing:'.22em',color:'rgba(255,255,255,.3)',textTransform:'uppercase'}}>Scroll</span>
        <div style={{width:'1px',height:'48px',background:'rgba(255,255,255,.15)',position:'relative',overflow:'hidden'}}>
          <div style={{position:'absolute',top:0,left:0,width:'100%',height:'40%',background:'rgba(255,255,255,.6)',animation:'scrollPulse 2s ease-in-out infinite'}}/>
        </div>
      </div>
    </section>
  );
}

function Btn({children,accent,filled,onClick,sm}){
  const [h,setH]=useState(false);
  return(
    <button onClick={onClick}
      onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
      style={{
        fontFamily:'var(--font)',fontSize:sm?'11px':'12px',fontWeight:600,
        letterSpacing:'.12em',textTransform:'uppercase',
        padding:sm?'9px 20px':'12px 28px',
        border:`1px solid ${accent}`,
        background:filled?(h?'#fff':accent):(h?accent:'transparent'),
        color:filled?'#000':(h?'#000':accent),
        cursor:'pointer',borderRadius:0,
        transition:'all .2s ease',
      }}>{children}</button>
  );
}

/* ── Marquee ─────────────────────────────────────── */
function Marquee({tweaks}){
  const text='MINDSET · YOU VS YOU · EST. 2021 · LIMITED DROP · NO RESTOCK · BUILT DIFFERENT · ';
  const repeated=text.repeat(8);
  return(
    <div style={{background:'#0a0a0a',borderTop:'1px solid #1a1a1a',borderBottom:'1px solid #1a1a1a',padding:'18px 0',overflow:'hidden'}}>
      <div className="marquee-inner" style={{animationDuration:`${tweaks.marqueeSpeed}s`}}>
        {[repeated,repeated].map((t,i)=>(
          <span key={i} style={{fontSize:'11px',fontWeight:500,letterSpacing:'.22em',color:'rgba(255,255,255,.18)',textTransform:'uppercase',whiteSpace:'nowrap'}}>{t}</span>
        ))}
      </div>
    </div>
  );
}

/* ── Latest Drop ─────────────────────────────────── */
function LatestDrop({tweaks}){
  const [ref,vis]=useScrollReveal(.08);
  const imgRef=useRef();
  const [parallaxY,setParallaxY]=useState(0);

  useEffect(()=>{
    const onScroll=()=>{
      if(!ref.current)return;
      const rect=ref.current.getBoundingClientRect();
      const offset=(window.innerHeight/2-(rect.top+rect.height/2))*0.2;
      setParallaxY(offset);
    };
    window.addEventListener('scroll',onScroll,{passive:true});
    return()=>window.removeEventListener('scroll',onScroll);
  },[]);

  return(
    <section ref={ref} className="latest-section" style={{display:'flex',height:'100vh',overflow:'hidden'}}>
      {/* Image — 55% */}
      <div className="latest-img" style={{
        flex:'0 0 55%',position:'relative',overflow:'hidden',
        opacity:vis?1:0,transform:vis?'translateX(0)':'translateX(-30px)',
        transition:'opacity 1s cubic-bezier(.16,1,.3,1), transform 1s cubic-bezier(.16,1,.3,1)',
      }}>
        <img src="images/other main.JPG" style={{
          width:'100%',height:'115%',objectFit:'contain',objectPosition:'center',
          transform:`translateY(${parallaxY}px)`,
          transition:'transform 0s',
          willChange:'transform',
          marginTop:'-7.5%',
        }} alt=""/>
        <div style={{position:'absolute',inset:0,background:'linear-gradient(to right,transparent 82%,#080808 100%)'}}/>
        <div style={{position:'absolute',inset:0,background:'linear-gradient(to bottom,#080808 0%,transparent 18%,transparent 82%,#080808 100%)'}}/>
      </div>

      {/* Text — 45% */}
      <div className="latest-text" style={{
        flex:'0 0 45%',position:'relative',
        opacity:vis?1:0,transform:vis?'translateX(0)':'translateX(30px)',
        transition:'opacity 1s cubic-bezier(.16,1,.3,1) .15s, transform 1s cubic-bezier(.16,1,.3,1) .15s',
      }}>
        <div className="latest-text-inner" style={{
          position:'absolute',top:'50%',left:0,right:0,
          transform:'translateY(-50%)',
          padding:'0 56px 0 48px',
        }}>
          <span style={{
            display:'inline-block',fontSize:'9px',letterSpacing:'.28em',textTransform:'uppercase',
            color:tweaks.accentColor,border:`1px solid ${tweaks.accentColor}`,
            padding:'5px 10px',marginBottom:'32px',fontWeight:500,
          }}>New Drop</span>

          <h2 style={{fontSize:'clamp(42px,4.5vw,64px)',fontWeight:800,letterSpacing:'-.03em',lineHeight:.95,textTransform:'uppercase',marginBottom:'28px'}}>
            The Angel<br/>Collection
          </h2>

          <p style={{fontSize:'14px',color:'var(--muted)',lineHeight:1.75,fontWeight:300,marginBottom:'36px',maxWidth:'300px'}}>
            Every drop tells a chapter. This one belongs to those who showed up when nobody was watching. Heavyweight oversized tee, olive colorway, angel graphic back print.
          </p>

          <div style={{display:'flex',gap:'28px',marginBottom:'36px',paddingBottom:'32px',borderBottom:'1px solid #1c1c1c'}}>
            {[['$48','Price'],['Limited','Availability']].map(([v,l])=>(
              <div key={l}>
                <div style={{fontSize:'16px',fontWeight:600,marginBottom:'4px'}}>{v}</div>
                <div style={{fontSize:'9px',letterSpacing:'.16em',textTransform:'uppercase',color:'var(--dim)'}}>{l}</div>
              </div>
            ))}
          </div>

          <div style={{display:'flex',gap:'12px'}}>
            <Btn accent={tweaks.accentColor} filled onClick={()=>window.location.href='product.html'}>Shop Now</Btn>
            <Btn accent={tweaks.accentColor} onClick={()=>window.location.href='product.html'}>Details</Btn>
          </div>

          <div style={{position:'absolute',bottom:'-40px',right:'40px',fontFamily:'var(--display)',fontSize:'180px',color:'rgba(255,255,255,.025)',lineHeight:1,userSelect:'none',pointerEvents:'none'}}>01</div>
        </div>
      </div>
    </section>
  );
}

/* ── Most Popular ────────────────────────────────── */
function MostPopular({tweaks,onAdd}){
  const [ref,vis]=useScrollReveal(.06);
  return(
    <section ref={ref} className="popular-section" style={{padding:'80px 40px 100px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginBottom:'48px'}}>
        <div style={{opacity:vis?1:0,transform:vis?'none':'translateY(16px)',transition:'opacity .6s ease,transform .6s ease'}}>
          <div style={{fontSize:'9px',letterSpacing:'.28em',textTransform:'uppercase',color:tweaks.accentColor,marginBottom:'10px',fontWeight:500}}>Collection</div>
          <h2 style={{fontSize:'clamp(36px,5vw,72px)',fontWeight:900,letterSpacing:'-.04em',textTransform:'uppercase',lineHeight:.9}}>Most<br/>Popular</h2>
        </div>
        <div style={{opacity:vis?1:0,transition:'opacity .6s ease .2s'}}>
          <Btn accent={tweaks.accentColor} sm>View All</Btn>
        </div>
      </div>
      <div className="popular-grid" style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'3px'}}>
        {PRODUCTS.map((p,i)=>(
          <PCard key={p.name} p={p} delay={i*0.12} vis={vis} tweaks={tweaks} onAdd={onAdd}/>
        ))}
      </div>
    </section>
  );
}

function PCard({p,delay,vis,tweaks,onAdd}){
  const [h,setH]=useState(false);
  const [tapped,setTapped]=useState(false);
  const isMobile=useMobile();
  const handleTouchStart=()=>{setTapped(true);};
  const handleTouchEnd=()=>{setTimeout(()=>setTapped(false),150);};
  return(
    <div
      style={{
        opacity:vis?1:0,
        transform:vis?(tapped?'scale(1.02) translateY(0)':'translateY(0)'):'translateY(28px)',
        transition:tapped
          ?`opacity .6s ease ${delay}s, transform .15s ease`
          :`opacity .6s ease ${delay}s, transform .6s cubic-bezier(.16,1,.3,1) ${delay}s`,
        cursor:'pointer',
      }}
      onClick={()=>window.location.href='product.html'}
      onMouseEnter={()=>setH(true)}
      onMouseLeave={()=>setH(false)}
      onTouchStart={handleTouchStart}
      onTouchEnd={handleTouchEnd}
    >
      {/* Image container */}
      <div style={{position:'relative',aspectRatio:'3/4',overflow:'hidden',marginBottom:'12px'}}>
        <img
          src={p.img}
          onError={e=>{e.currentTarget.src='images/single.JPG';}}
          style={{
            width:'100%',height:'100%',objectFit:'cover',
            transform:h?'scale(1.05)':'scale(1)',
            transition:'transform .4s cubic-bezier(.16,1,.3,1)',
          }}
          alt={p.name}
        />
        {/* Hover overlay */}
        <div style={{
          position:'absolute',inset:0,
          background:'linear-gradient(to top,rgba(0,0,0,.75) 0%,rgba(0,0,0,.1) 60%,transparent 100%)',
          opacity:h?1:0,
          transition:'opacity .3s ease',
          display:'flex',alignItems:'flex-end',justifyContent:'center',
          paddingBottom:'20px',
        }}>
          <button
            onClick={e=>{e.stopPropagation();onAdd&&onAdd();}}
            style={{
              fontFamily:'var(--font)',fontSize:'10px',fontWeight:600,letterSpacing:'.16em',
              textTransform:'uppercase',background:'none',
              border:'1px solid rgba(255,255,255,.8)',
              color:'#fff',cursor:'pointer',padding:'9px 22px',
              transition:'background .2s ease,color .2s ease',
            }}
            onMouseEnter={e=>{e.stopPropagation();e.currentTarget.style.background='#fff';e.currentTarget.style.color='#000';}}
            onMouseLeave={e=>{e.currentTarget.style.background='none';e.currentTarget.style.color='#fff';}}
          >Quick Add</button>
        </div>
      </div>

      {/* Name + Price */}
      <div style={{
        display:'flex',justifyContent:'space-between',alignItems:'center',
        padding:'0 2px',
        transform:h?'translateY(-4px)':'translateY(0)',
        transition:'transform .3s ease',
      }}>
        <span style={{fontSize:'13px',fontWeight:300,letterSpacing:'-.01em',color:'var(--text)'}}>{p.name}</span>
        <span style={{fontSize:'13px',fontWeight:600,color:h?tweaks.accentColor:'var(--muted)',transition:'color .2s'}}>{p.price}</span>
      </div>
    </div>
  );
}

function FootLink({children,href,sm,external}){
  const [h,setH]=useState(false);
  return(
    <a href={href||'#'}
      target={external?'_blank':undefined}
      rel={external?'noopener noreferrer':undefined}
      style={{fontSize:sm?'11px':'12px',color:h?'rgba(255,255,255,.6)':'var(--dim)',textDecoration:'none',transition:'color .2s',fontWeight:300}}
      onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}>
      {children}
    </a>
  );
}

function SocialIcon({href,svg,accent}){
  const [h,setH]=useState(false);
  return(
    <a href={href} target="_blank" rel="noopener noreferrer"
      onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
      style={{color:h?accent:'var(--muted)',transition:'color .2s',display:'flex',alignItems:'center',lineHeight:0}}>

  );
}

/* ── Tweaks Panel ────────────────────────────────── */
function TweaksPanel({tweaks,setTweaks,visible}){
  const upd=(k,v)=>{const n={...tweaks,[k]:v};setTweaks(n);window.parent.postMessage({type:'__edit_mode_set_keys',edits:n},'*');};
  if(!visible)return null;
  return(
    <div style={{
      position:'fixed',bottom:'20px',right:'20px',zIndex:9999,
      background:'rgba(14,14,14,.96)',backdropFilter:'blur(20px)',
      border:'1px solid rgba(255,255,255,.08)',borderRadius:'4px',
      padding:'18px',width:'240px',
      boxShadow:'0 20px 50px rgba(0,0,0,.7)',
      fontFamily:'var(--font)',
    }}>
      <div style={{fontSize:'9px',letterSpacing:'.22em',textTransform:'uppercase',color:'rgba(255,255,255,.35)',marginBottom:'16px',fontWeight:500}}>Tweaks</div>
      {[
        ['Accent Color','accentColor','color'],
        ['Hero Line 1','heroLine1','text'],
        ['Hero Line 2','heroLine2','text'],
      ].map(([label,key,type])=>(
        <div key={key} style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}}>
          <span style={{fontSize:'11px',color:'rgba(255,255,255,.4)',fontWeight:300}}>{label}</span>
          {type==='color'
            ?<input type="color" value={tweaks[key]} onChange={e=>upd(key,e.target.value)} style={{width:'34px',height:'24px',border:'none',cursor:'pointer',background:'none'}}/>
            :<input value={tweaks[key]} onChange={e=>upd(key,e.target.value)} style={{background:'rgba(255,255,255,.05)',border:'1px solid rgba(255,255,255,.08)',color:'#fff',padding:'4px 8px',borderRadius:'2px',width:'110px',fontSize:'11px',fontFamily:'var(--font)'}}/>
          }
        </div>
      ))}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'4px'}}>
        <span style={{fontSize:'11px',color:'rgba(255,255,255,.4)',fontWeight:300}}>Marquee Speed</span>
        <input type="range" min={8} max={40} value={tweaks.marqueeSpeed} onChange={e=>upd('marqueeSpeed',+e.target.value)} style={{width:'90px'}}/>
      </div>
    </div>
  );
}

/* ── App ─────────────────────────────────────────── */
function App(){
  const [tweaks,setTweaks]=useState(TWEAK_DEFAULTS);
  const [cart,setCart]=useState(0);
  const [tweaksVisible,setTweaksVisible]=useState(false);
  const isMobile=useMobile();

  useEffect(()=>{
    document.documentElement.style.setProperty('--accent',tweaks.accentColor);
  },[tweaks.accentColor]);

  useEffect(()=>{
    const fn=(e)=>{
      if(e.data?.type==='__activate_edit_mode')setTweaksVisible(true);
      if(e.data?.type==='__deactivate_edit_mode')setTweaksVisible(false);
    };
    window.addEventListener('message',fn);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return()=>window.removeEventListener('message',fn);
  },[]);

  // Init custom cursor (desktop only)
  useEffect(()=>{
    if(!isMobile) initCursor();
  },[isMobile]);

  return(
    <>
      <Nav cart={cart} tweaks={tweaks}/>
      <Hero tweaks={tweaks} onAdd={()=>setCart(c=>c+1)}/>
      <Marquee tweaks={tweaks}/>
      <LatestDrop tweaks={tweaks}/>
      <MostPopular tweaks={tweaks} onAdd={()=>setCart(c=>c+1)}/>
      <Footer tweaks={tweaks}/>
      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} visible={tweaksVisible}/>
      <style>{`
        @keyframes scrollPulse{0%,100%{opacity:.3;transform:scaleY(1)}50%{opacity:1;transform:scaleY(.5)}}
        @keyframes kenburns{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
      `}</style>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
