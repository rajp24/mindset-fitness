<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Angel Tee — MINDSET</title>
<link rel="icon" type="image/png" href="images/logo.png" sizes="32x32"/>
<link rel="apple-touch-icon" href="images/logo.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#080808;
  --text:#f2f2f2;
  --muted:#666;
  --dim:#333;
  --accent:#00BD7B;
  --font:'Inter',sans-serif;
  --display:'Bebas Neue',sans-serif;
}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:var(--font);overflow-x:hidden;-webkit-font-smoothing:antialiased;}
::selection{background:var(--accent);color:#000;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:#222;}

/* Mobile nav dropdown */
.mobile-menu{display:none;position:fixed;top:56px;left:0;right:0;background:rgba(8,8,8,.98);backdrop-filter:blur(24px);border-bottom:1px solid rgba(255,255,255,.06);z-index:999;flex-direction:column;padding:16px 0;}
.mobile-menu.open{display:flex;}
.mobile-menu a{padding:14px 28px;font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:#fff;text-decoration:none;border-bottom:1px solid rgba(255,255,255,.05);}
.mobile-menu a:last-child{border-bottom:none;}

@media(max-width:768px){
  .nav-links{display:none!important;}
  .hamburger{display:flex!important;}
  .product-layout{flex-direction:column!important;}
  .product-left{position:static!important;height:auto!important;flex:none!important;width:100%!important;}
  .product-main-img{height:72vw!important;min-height:280px!important;max-height:480px!important;}
  .product-right{padding:32px 20px 60px!important;justify-content:flex-start!important;}
  .size-btn{width:48px!important;height:48px!important;}
  .add-to-cart{min-height:56px!important;font-size:13px!important;}
}
@media(max-width:480px){
  .product-main-img{height:80vw!important;}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect} = React;

const ACCENT = '#00BD7B';

function useMobile(bp=768){
  const [m,setM]=useState(typeof window!=='undefined'&&window.innerWidth<=bp);
  useEffect(()=>{
    const fn=()=>setM(window.innerWidth<=bp);
    window.addEventListener('resize',fn);return()=>window.removeEventListener('resize',fn);
  },[bp]);
  return m;
}

const IMAGES=[
  {src:'images/main.jpg',alt:'Angel Tee — front'},
  {src:'images/other main.JPG',alt:'Angel Tee — detail'},
  {src:'images/single.JPG',alt:'Angel Tee — lifestyle'},
];

function Nav({cart}){
  const [scrolled,setScrolled]=useState(false);
  const [menuOpen,setMenuOpen]=useState(false);
  const isMobile=useMobile();
  useEffect(()=>{
    const fn=()=>setScrolled(window.scrollY>60);
    window.addEventListener('scroll',fn);return()=>window.removeEventListener('scroll',fn);
  },[]);
  const links=[
    {label:'Home',href:'index.html'},
    {label:'Summer Drop',href:'https://mindset-fitness.vercel.app/product.html'},
    {label:'Fall Line',href:'fall-line.html'},
    {label:'Winter Line',href:'winter-line.html'},
  ];
  return(
    <>
      <nav style={{
        position:'fixed',top:0,left:0,right:0,zIndex:1000,
        padding:'0 28px',height:'56px',
        display:'flex',alignItems:'center',justifyContent:'space-between',
        background:'rgba(8,8,8,.92)',backdropFilter:'blur(24px)',
        borderBottom:'1px solid rgba(255,255,255,.06)',
        transition:'all .35s ease',
      }}>
        <a href="index.html" style={{display:'flex',alignItems:'center',textDecoration:'none',lineHeight:0}}>
          <img src="images/logo.png" alt="MINDSET"
            style={{height:'30px',objectFit:'contain',filter:'brightness(0) invert(1)'}}
            onError={e=>{e.currentTarget.style.display='none';e.currentTarget.nextSibling.style.display='block';}}
          />
          <span style={{display:'none',fontFamily:'var(--display)',fontSize:'20px',letterSpacing:'.2em',color:'#fff'}}>MINDSET</span>
        </a>
        <div className="nav-links" style={{display:'flex',gap:'32px'}}>
          {links.map(l=><NavLink key={l.label} href={l.href}>{l.label}</NavLink>)}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:'20px'}}>
          <CartBtn count={cart}/>
          <button className="hamburger" onClick={()=>setMenuOpen(o=>!o)}
            style={{display:'none',flexDirection:'column',gap:'5px',background:'none',border:'none',cursor:'pointer',padding:'4px'}}>
            <span style={{width:'22px',height:'1.5px',background:'#fff',display:'block',transition:'all .2s'}}/>
            <span style={{width:'22px',height:'1.5px',background:'#fff',display:'block',transition:'all .2s'}}/>
            <span style={{width:'22px',height:'1.5px',background:'#fff',display:'block',transition:'all .2s'}}/>
          </button>
        </div>
      </nav>
      <div className={`mobile-menu${menuOpen?' open':''}`}>
        {links.map(l=><a key={l.label} href={l.href} onClick={()=>setMenuOpen(false)}>{l.label}</a>)}
      </div>
    </>
  );
}

function NavLink({children,href}){
  const [h,setH]=useState(false);
  return(
    <a href={href||'#'} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
      style={{fontSize:'12px',letterSpacing:'.1em',textTransform:'uppercase',
        color:h?ACCENT:'#fff',transition:'color .2s',fontWeight:500,textDecoration:'none'}}>
      {children}
    </a>
  );
}

function CartBtn({count}){
  return(
    <div style={{position:'relative',cursor:'pointer',color:'#fff'}}>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
        <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/>
        <path d="M16 10a4 4 0 0 1-8 0"/>
      </svg>
      {count>0&&<span style={{position:'absolute',top:'-5px',right:'-5px',background:ACCENT,color:'#000',borderRadius:'50%',width:'15px',height:'15px',fontSize:'9px',fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center'}}>{count}</span>}
    </div>
  );
}

function Thumb({img,active,onClick}){
  const [h,setH]=useState(false);
  return(
    <div onClick={onClick} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
      style={{
        width:'80px',height:'96px',flexShrink:0,cursor:'pointer',overflow:'hidden',
        outline:active?`2px solid ${ACCENT}`:(h?'2px solid rgba(255,255,255,.3)':'2px solid transparent'),
        outlineOffset:'-2px',transition:'outline .2s ease',
      }}>
      <img src={img.src} alt={img.alt}
        style={{width:'100%',height:'100%',objectFit:'cover',objectPosition:'center top',
          opacity:active?1:(h?.85:.5),transition:'opacity .2s ease'}}/>
    </div>
  );
}

function SizeBtn({size,selected,onClick}){
  const [h,setH]=useState(false);
  const [popped,setPopped]=useState(false);
  const handleClick=()=>{
    onClick();
    setPopped(true);
    setTimeout(()=>setPopped(false),150);
  };
  return(
    <button onClick={handleClick}
      onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
      className="size-btn"
      style={{
        width:'52px',height:'44px',
        border:`1px solid ${selected?ACCENT:(h?'rgba(255,255,255,.4)':'rgba(255,255,255,.15)')}`,
        background:selected?ACCENT:'transparent',
        color:selected?'#000':(h?'#fff':'var(--muted)'),
        fontFamily:'var(--font)',fontSize:'11px',fontWeight:600,
        letterSpacing:'.08em',textTransform:'uppercase',
        cursor:'pointer',
        transform:popped?'scale(1.08)':'scale(1)',
        transition:'transform .15s ease, border .2s ease, background .2s ease, color .2s ease',
      }}>{size}</button>
  );
}

function ProductPage(){
  const [cart,setCart]=useState(0);
  const [selectedSize,setSelectedSize]=useState(null);
  const [added,setAdded]=useState(false);
  const [pulsing,setPulsing]=useState(false);
  const [in_,setIn]=useState(false);
  const [activeImg,setActiveImg]=useState(0);
  const isMobile=useMobile();
  useEffect(()=>{setTimeout(()=>setIn(true),80);},[]);

  const sizes=['XS','S','M','L','XL','XXL'];

  const handleAddToCart=()=>{
    if(!selectedSize)return;
    setPulsing(true);
    setTimeout(()=>{
      setPulsing(false);
      setCart(c=>c+1);
      setAdded(true);
      setTimeout(()=>setAdded(false),1500);
    },200);
  };

  return(
    <>
      <Nav cart={cart}/>
      <main className="product-layout" style={{
        minHeight:'100vh',
        display:'flex',
        paddingTop:'56px',
      }}>
        {/* Left — image gallery */}
        <div className="product-left" style={{
          flex:'0 0 55%',
          position:'sticky',
          top:'56px',
          height:'calc(100vh - 56px)',
          display:'flex',
          flexDirection:'column',
          opacity:in_?1:0,
          transform:in_?'translateX(0)':'translateX(-20px)',
          transition:'opacity .9s ease .1s, transform .9s cubic-bezier(.16,1,.3,1) .1s',
        }}>
          {/* Main image */}
          <div className="product-main-img" style={{flex:1,position:'relative',overflow:'hidden'}}>
            <img src={IMAGES[activeImg].src} alt={IMAGES[activeImg].alt}
              key={activeImg}
              style={{width:'100%',height:'100%',objectFit:'cover',objectPosition:'center 65%',
                animation:'fadeIn .3s ease'}}/>
            <div style={{position:'absolute',inset:0,background:'linear-gradient(to right,transparent 80%,#080808 100%)'}}/>
            <div style={{position:'absolute',inset:0,background:'linear-gradient(to bottom,#080808 0%,transparent 8%)'}}/>
          </div>
          {/* Thumbnail strip — horizontal at bottom */}
          <div style={{
            display:'flex',gap:'6px',
            padding:'10px 12px',
            background:'var(--bg)',
            borderTop:'1px solid #141414',
          }}>
            {IMAGES.map((img,i)=>(
              <Thumb key={i} img={img} active={activeImg===i} onClick={()=>setActiveImg(i)}/>
            ))}
          </div>
        </div>

        {/* Right — details */}
        <div className="product-right" style={{
          flex:'1',
          padding:'64px 56px 80px 48px',
          display:'flex',
          flexDirection:'column',
          justifyContent:'center',
          opacity:in_?1:0,
          transform:in_?'translateX(0)':'translateX(20px)',
          transition:'opacity .9s ease .2s, transform .9s cubic-bezier(.16,1,.3,1) .2s',
        }}>

          <span style={{
            display:'inline-block',alignSelf:'flex-start',
            fontSize:'9px',letterSpacing:'.28em',textTransform:'uppercase',
            color:ACCENT,border:`1px solid ${ACCENT}`,
            padding:'5px 12px',marginBottom:'28px',fontWeight:500,
          }}>Limited Drop</span>

          <h1 style={{
            fontSize:'clamp(40px,5vw,72px)',
            fontWeight:900,letterSpacing:'-.03em',lineHeight:.9,
            textTransform:'uppercase',marginBottom:'20px',
          }}>The Angel<br/>Tee</h1>

          <div style={{
            fontSize:'28px',fontWeight:600,letterSpacing:'-.02em',
            marginBottom:'28px',color:'#fff',
          }}>$48</div>

          <div style={{height:'1px',background:'#1c1c1c',marginBottom:'28px'}}/>

          <p style={{
            fontSize:'14px',color:'var(--muted)',lineHeight:1.8,
            fontWeight:300,marginBottom:'36px',maxWidth:'340px',
          }}>
            Every drop tells a chapter. This one belongs to those who showed up when nobody was watching. Heavyweight oversized tee, olive colorway, angel graphic back print. 100% cotton. Limited run — no restock.
          </p>

          <div style={{marginBottom:'12px'}}>
            <div style={{fontSize:'9px',letterSpacing:'.22em',textTransform:'uppercase',color:'rgba(255,255,255,.4)',marginBottom:'12px',fontWeight:500}}>Select Size</div>
            <div style={{display:'flex',gap:'8px',flexWrap:'wrap'}}>
              {sizes.map(s=>(
                <SizeBtn key={s} size={s} selected={selectedSize===s} onClick={()=>setSelectedSize(s)}/>
              ))}
            </div>
          </div>

          <a href="#" style={{
            fontSize:'11px',color:'var(--muted)',textDecoration:'underline',
            textUnderlineOffset:'3px',letterSpacing:'.04em',
            marginBottom:'32px',display:'inline-block',transition:'color .2s',
          }}
          onMouseEnter={e=>e.currentTarget.style.color='#fff'}
          onMouseLeave={e=>e.currentTarget.style.color='var(--muted)'}
          >Size guide</a>

          <button onClick={handleAddToCart}
            className="add-to-cart"
            style={{
              width:'100%',padding:'16px',minHeight:'52px',
              background:added?'#fff':(!selectedSize?'rgba(0,189,123,.35)':ACCENT),
              border:'none',cursor:selectedSize?'pointer':'not-allowed',
              fontFamily:'var(--font)',fontSize:'12px',fontWeight:700,
              letterSpacing:'.18em',textTransform:'uppercase',
              color:'#000',
              transform:pulsing?'scale(0.97)':'scale(1)',
              transition:'transform .2s ease, background .25s ease',
              marginBottom:'20px',
            }}>
            {added?'✓  Added':(!selectedSize?'Select a Size':'Add to Cart')}
          </button>

          <div style={{
            display:'flex',gap:'6px',flexWrap:'wrap',
            fontSize:'11px',color:'rgba(255,255,255,.25)',letterSpacing:'.06em',
          }}>
            <span>Free shipping over $75</span>
            <span style={{color:'rgba(255,255,255,.1)'}}>·</span>
            <span>Limited stock</span>
            <span style={{color:'rgba(255,255,255,.1)'}}>·</span>
            <span>No restocks</span>
          </div>

        </div>
      </main>
      <style>{`@keyframes fadeIn{from{opacity:0}to{opacity:1}}`}</style>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ProductPage/>);
</script>
</body>
</html>
